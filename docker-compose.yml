services:
  sim:
    build: .
    image: sim_robo:humble
    container_name: sim_robo
    environment:
      - DISPLAY=:99
      - GAZEBO_MODEL_PATH=/workspace/src
      - LIBGL_ALWAYS_SOFTWARE=1
      - GALLIUM_DRIVER=llvmpipe
      - ROS_DOMAIN_ID=42
    volumes:
      - .:/workspace
      - gazebo-cache:/root/.gazebo
    ports:
      - "5900:5900"                # VNC viewer
      - "7400-7500:7400-7500/udp"  # DDS Discovery and Data
      - "9090:9090"                # rosbridge WebSocket (optional)
    stdin_open: true
    tty: true

volumes:
  gazebo-cache:
    external: true
    name: sim_robo_gazebo-cache
